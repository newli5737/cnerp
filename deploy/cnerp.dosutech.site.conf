# CNERP Frontend — /home/cnerp
# Cert: /etc/letsencrypt/live/cnerp.dosutech.site/
# sudo ln -sf /home/cnerp/deploy/cnerp.dosutech.site.conf /etc/nginx/sites-enabled/

server {
    server_name cnerp.dosutech.site;

    root /home/cnerp/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cnerp.dosutech.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cnerp.dosutech.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = cnerp.dosutech.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name cnerp.dosutech.site;
    return 404; # managed by Certbot
}
